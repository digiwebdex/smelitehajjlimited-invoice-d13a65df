# ============================================
# SM Elite Hajj Invoice - Nginx Config (LOCKED)
# Domain: soft.smelitehajj.com
# API Port: 3003
# Storage: /var/www/smelitehajj
# ============================================

server {
    listen 80;
    server_name soft.smelitehajj.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name soft.smelitehajj.com;

    # SSL certs (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/soft.smelitehajj.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soft.smelitehajj.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend (LOCKED path)
    root /var/www/smelitehajj/dist;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy (LOCKED to port 3003)
    location /api/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        client_max_body_size 10M;
    }

    # File uploads (LOCKED path)
    location /uploads/ {
        alias /var/www/smelitehajj/migration/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
